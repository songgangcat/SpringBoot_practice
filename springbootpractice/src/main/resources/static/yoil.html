<!-- 정적 HTML 테스트용 -->

<!DOCTYPE html> <!-- 이 문서는 HTML5라고 선언 -->
<html lang="ko"> <!-- 문서 언어 -->
<head>
    <meta charset="UTF-8"> <!-- 이 문서의 인코딩 선언 -->
    <title>Title</title> <!-- 브라우저 탭에 표시되는 제목 -->
</head>
<body> <!-- 실제 화면에 보이는 내용 영역 시작 -->

<a href="/getYoil"> <!-- 코드스페이스 문제로 상대주소로 작성 -->
    오늘의 요일을 알고싶다면 클릭!!!
</a> <!-- <a> = 하이퍼링크 -->

<br><br> <!-- 줄바꿈 -> 두번 쓰면 한줄 더 띄움 -->
<!-- form ->  -->
<form action="/getYoil" method="get"> <!-- /getYoil로 요청 보냄, URl로 파라미터 붙여서 보냄 -->
    <input type="text" name="year">년<br> <!-- 입력칸 생성, 서버와 변수 name 일치해야 함 -->
    <input type="text" name="month">월<br>
    <input type="text" name="day">일<br><br>
    <input type="submit" value="보내기"> <!-- 버튼 누르면 폼 전송 -->
</form>

</body>
</html>
